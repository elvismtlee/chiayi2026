        // Core App Initialization
        document.addEventListener("DOMContentLoaded", function() {
            initMetrics(dataset);
            initCharts(dataset);
            renderTable(dataset);
            
            // Set up event listeners for instant searching and filtering
            document.getElementById('searchLocation').addEventListener('input', filterData);
            document.getElementById('filterCategory').addEventListener('change', filterData);
        });

        // Calculate and Render Metrics
        function initMetrics(data) {
            document.getElementById('metric-total').innerText = data.length.toLocaleString();
            
            // Calculate Top Category & Top Road
            const catCounts = {};
            const roadCounts = {};
            let resolvedCount = 0;
            
            data.forEach(item => {
                catCounts[item.category] = (catCounts[item.category] || 0) + 1;
                roadCounts[item.road] = (roadCounts[item.road] || 0) + 1;
                if(item.status === "已結案") resolvedCount++;
            });
            
            const topCategory = Object.keys(catCounts).reduce((a, b) => catCounts[a] > catCounts[b] ? a : b, '-');
            const topRoad = Object.keys(roadCounts).reduce((a, b) => roadCounts[a] > roadCounts[b] ? a : b, '-');
            const resRate = Math.round((resolvedCount / data.length) * 100);
            
            document.getElementById('metric-top-category').innerText = `${topCategory} (${catCounts[topCategory]}件)`;
            document.getElementById('metric-top-road').innerText = `西區${topRoad} (${roadCounts[topRoad]}件)`;
            document.getElementById('metric-resolution').innerText = `${resRate}%`;
        }

        // Initialize Elegant Charts using Chart.js
        let catChart, roadChart;
        function initCharts(data) {
            const catCounts = {};
            const roadCounts = {};
            
            data.forEach(item => {
                catCounts[item.category] = (catCounts[item.category] || 0) + 1;
                roadCounts[item.road] = (roadCounts[item.road] || 0) + 1;
            });

            // Sort roads for bar chart
            const sortedRoads = Object.keys(roadCounts).sort((a,b) => roadCounts[b] - roadCounts[a]);
            const topRoadsLabels = sortedRoads.slice(0, 10);
            const topRoadsValues = topRoadsLabels.map(r => roadCounts[r]);

            // Chart 1: Categories Donut Chart
            const ctxCat = document.getElementById('chartCategories').getContext('2d');
            catChart = new Chart(ctxCat, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catCounts),
                    datasets: [{
                        data: Object.values(catCounts),
                        backgroundColor: ['#1e3a8a', '#78350f', '#065f46', '#991b1b', '#374151', '#854d0e'],
                        borderWidth: 1,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Noto Serif TC', size: 11 } } }
                    }
                }
            });

            // Chart 2: Top Roads Horizontal Bar Chart
            const ctxRoad = document.getElementById('chartRoads').getContext('2d');
            roadChart = new Chart(ctxRoad, {
                type: 'bar',
                data: {
                    labels: topRoadsLabels.map(r => `西區${r}`),
                    datasets: [{
                        label: '陳情案件數',
                        data: topRoadsValues,
                        backgroundColor: '#44403c',
                        hoverBackgroundColor: '#1a1a1a',
                        barThickness: 16
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Noto Serif TC' } } },
                        y: { grid: { display: false }, ticks: { font: { family: 'Noto Serif TC' } } }
                    }
                }
            });
        }

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const statusClass = item.status === "已結案" ? "bg-emerald-50 text-emerald-700" : "bg-amber-50 text-amber-700";
                const row = `
                    <tr class="hover:bg-stone-50 transition-colors">
                        <td class="p-3 font-mono text-xs font-semibold text-stone-500">${item.id}</td>
                        <td class="p-3 text-stone-600">${item.date}</td>
                        <td class="p-3"><span class="px-2 py-0.5 text-xs bg-stone-100 text-stone-800 rounded-none border border-stone-200">${item.category}</span></td>
                        <td class="p-3 font-medium text-stone-900">${item.location}</td>
                        <td class="p-3 text-xs text-stone-600 italic font-sans leading-relaxed">${item.description}</td>
                        <td class="p-3 text-center"><span class="px-2 py-0.5 text-xs rounded-none font-medium ${statusClass}">${item.status}</span></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
            
            document.getElementById('table-metadata').innerText = `顯示共 ${data.length} 筆篩選紀錄`;
        }

        // Real-time Data Filter Handler
        function filterData() {
            const searchVal = document.getElementById('searchLocation').value.toLowerCase();
            const catVal = document.getElementById('filterCategory').value;
            
            const filtered = dataset.filter(item => {
                const matchesSearch = item.location.toLowerCase().includes(searchVal) || item.description.toLowerCase().includes(searchVal);
                const matchesCat = catVal === "" || item.category === catVal;
                return matchesSearch && matchesCat;
            });
            
            renderTable(filtered);
        }
    </script>
</body>
</html>
