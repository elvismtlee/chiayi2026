name: Chiayi City Data Scraper

on:
  push:
    branches:
      - main  # 每次有程式更新時觸發執行
  schedule:
    - cron: '0 16 * * *'  # 每天台灣時間凌晨 12:00 自動執行 (UTC 16:00)

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查並載入專案程式碼
      uses: actions/checkout@v3

    - name: 初始化 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝核心數據套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 執行嘉義市故障數據分析引擎
      run: python scraper.py

    - name: 將處理完的 CSV 存為雲端存檔
      uses: actions/upload-artifact@v3
      with:
        name: chiayi-clean-data
        path: chiayi_dashboard_latest.csv
