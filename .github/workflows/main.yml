name: Chiayi City Live Dashboard Builder

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 16 * * *' # 每天凌晨自動更新

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許機器人更新網頁檔案

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install requests beautifulsoup4 pandas gspread oauth2client
    
    - name: 執行資料庫同步與網頁編譯
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: python build_dashboard.py
      
    - name: 自動將最新儀表板上線
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        git commit -m "Auto-update dashboard with latest live data" || echo "No changes to commit"
        git push
